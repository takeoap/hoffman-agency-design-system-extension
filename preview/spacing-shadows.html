<!doctype html>
<!-- @dsCard group="Brand" name="Shadows" subtitle="Navy-tinted, rare" viewport="700x200" --><html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:18px">
  <div class="meta">Shadows — navy-tinted, rare</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:10px 0 18px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:160px;height:90px;background:#fff;box-shadow:0 1px 0 rgba(24,45,67,.08);border:1px solid #E4E9EF"></div>
      <code style="font:500 11px/1 var(--font-mono)">shadow-1</code>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:160px;height:90px;background:#fff;box-shadow:0 4px 14px -4px rgba(24,45,67,.12),0 1px 0 rgba(24,45,67,.06)"></div>
      <code style="font:500 11px/1 var(--font-mono)">shadow-2</code>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:160px;height:90px;background:#fff;box-shadow:0 18px 40px -18px rgba(24,45,67,.28),0 2px 0 rgba(24,45,67,.06)"></div>
      <code style="font:500 11px/1 var(--font-mono)">shadow-3</code>
    </div>
  </div>
  <p style="font:400 12px/1.4 var(--font-sans);color:var(--fg-2);margin:0">Cards usually carry no shadow. Shadows reserved for elevated UI (modals, menus). No coloured or glow shadows.</p>
</div>
</body></html>
