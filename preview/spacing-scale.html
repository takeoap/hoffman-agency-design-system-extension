<!doctype html>
<!-- @dsCard group="Brand" name="Spacing scale" subtitle="4px base — s-1 through s-24" viewport="700x280" --><html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:14px">
  <div class="meta">Spacing — 4px base</div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="display:grid;grid-template-columns:60px 80px 1fr;gap:12px;align-items:center"><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">s-1</code><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">4px</code><div style="height:10px;background:#182D43;width:4px"></div></div>
    <div style="display:grid;grid-template-columns:60px 80px 1fr;gap:12px;align-items:center"><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">s-2</code><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">8px</code><div style="height:10px;background:#182D43;width:8px"></div></div>
    <div style="display:grid;grid-template-columns:60px 80px 1fr;gap:12px;align-items:center"><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">s-4</code><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">16px</code><div style="height:10px;background:#182D43;width:16px"></div></div>
    <div style="display:grid;grid-template-columns:60px 80px 1fr;gap:12px;align-items:center"><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">s-6</code><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">24px</code><div style="height:10px;background:#182D43;width:24px"></div></div>
    <div style="display:grid;grid-template-columns:60px 80px 1fr;gap:12px;align-items:center"><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">s-8</code><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">32px</code><div style="height:10px;background:#182D43;width:32px"></div></div>
    <div style="display:grid;grid-template-columns:60px 80px 1fr;gap:12px;align-items:center"><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">s-12</code><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">48px</code><div style="height:10px;background:#182D43;width:48px"></div></div>
    <div style="display:grid;grid-template-columns:60px 80px 1fr;gap:12px;align-items:center"><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">s-16</code><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">64px</code><div style="height:10px;background:#182D43;width:64px"></div></div>
    <div style="display:grid;grid-template-columns:60px 80px 1fr;gap:12px;align-items:center"><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">s-20</code><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">80px</code><div style="height:10px;background:#182D43;width:80px"></div></div>
    <div style="display:grid;grid-template-columns:60px 80px 1fr;gap:12px;align-items:center"><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">s-24</code><code style="font:500 11px/1 var(--font-mono);color:var(--fg-2)">96px</code><div style="height:10px;background:#182D43;width:96px"></div></div>
  </div>
</div>
</body></html>
