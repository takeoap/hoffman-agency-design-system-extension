<!doctype html>
<!-- @dsCard group="Brand" name="Radii" subtitle="Square by default" viewport="700x200" --><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:16px">
  <div class="meta">Radii — editorial, near-square by default</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:80px;height:80px;background:#182D43;border-radius:0"></div><code style="font:500 11px/1 var(--font-mono)">0 · default</code></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:80px;height:80px;background:#182D43;border-radius:2px"></div><code style="font:500 11px/1 var(--font-mono)">2 · r-1</code></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:80px;height:80px;background:#182D43;border-radius:6px"></div><code style="font:500 11px/1 var(--font-mono)">6 · inputs</code></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:80px;height:80px;background:#182D43;border-radius:10px"></div><code style="font:500 11px/1 var(--font-mono)">10 · chips</code></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:80px;height:80px;background:#182D43;border-radius:999px"></div><code style="font:500 11px/1 var(--font-mono)">pill · tags</code></div>
  </div>
  <p style="font:400 12px/1.4 var(--font-sans);color:var(--fg-2);margin:0">Square/near-square is the default. Buttons are square. Avoid rounded-rectangle card syndrome.</p>
</div>
</body></html>
